<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 mt-5">
                    <div class="card p-5">
                        <form class="form-control p-5">
                            <label for="exapleInputName" class="form-label">Book Name:-</label>
                            <input type="text" class="form-control mb-3" placeholder="Real name of book"></input>
                            <label for="exapleInputName" >Author Name:-</label>
                            <input type="text" class="form-control mb-3" placeholder="Author's Name">
                            <label for="exapleInputName" >Book Edition:-</label>
                            <input type="text" class="form-control mb-3" placeholder="Book Edition">
                            <label for="exapleInputName" >Book Type:-</label>
                                <select class="form-select">
                                    <option>Select</option>
                                    <option>fictional</option>
                                    <option>Noval</option>
                                    <option>Reference:</option>
                                    <option>Textbooks/Academic</option>
                                    <option>Science Fiction (Sci-Fi)</option>
                                    <option>Autobiography/Biography</option>
                                </select>
                            <!-- <input type="none"> -->

                            <label for="exapleInputName">Published Year:-</label>
                            <input type="text" class="form-control mb-3" placeholder="Published Year">

                            <div class=" text-center">
                                <button type="submit" class="btn btn-primary px-5">submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </form>
</body>
</html>
